# partially taken from Articubot One project by Articulated Robotics
# see: https://github.com/joshnewans/articubot_one/tree/new_gazebo
- ros_topic_name: "clock"
  gz_topic_name: "clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS
- ros_topic_name: "tf"
  gz_topic_name: "tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS
- ros_topic_name: "gazebo_odom"
  gz_topic_name: "odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS
- ros_topic_name: "joint_states"
  gz_topic_name: "joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS
# 2D lidar
- ros_topic_name: "scan"
  gz_topic_name: "scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS
# 3D lidar
- ros_topic_name: "scan_3d"
  gz_topic_name: "scan_3d"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS
- ros_topic_name: "imu"
  gz_topic_name: "imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS
# ─── RGB Color Camera ───────────────────────────────────────────────────────
- ros_topic_name: "/camera/camera/color/image_raw"
  gz_topic_name: "/camera/camera/color/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS
- ros_topic_name: "/camera/camera/aligned_depth_to_color/image_raw"
  gz_topic_name: "/camera/camera/color/depth_image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS
- ros_topic_name: "/camera/camera/color/camera_info"
  gz_topic_name: "/camera/camera/color/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS
# ─── Depth Camera ────────────────────────────────────────────────────────────
- ros_topic_name: "/camera/camera/depth/image_rect_raw"
  gz_topic_name: "/camera/camera/depth"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS
- ros_topic_name: "/camera/camera/depth/camera_info"
  gz_topic_name: "/camera/camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS
# ─── PointCloud ──────────────────────────────────────────────────────────────
- ros_topic_name: "/camera/camera/depth/color/points"
  gz_topic_name: "/camera/camera/depth/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS
# ─── Infra1 (Left IR) ────────────────────────────────────────────────────────
- ros_topic_name: "/camera/camera/infra1/image_raw"
  gz_topic_name: "/camera/camera/infra1/image_raw"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS
- ros_topic_name: "/camera/camera/infra1/camera_info"
  gz_topic_name: "/camera/camera/infra1/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS
# ─── Infra2 (Right IR) ───────────────────────────────────────────────────────
- ros_topic_name: "/camera/camera/infra2/image_raw"
  gz_topic_name: "/camera/camera/infra2/image_raw"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS
- ros_topic_name: "/camera/camera/infra2/camera_info"
  gz_topic_name: "/camera/camera/infra2/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS
# ─── Livox MID-360 ───────────────────────────────────────────────────────────
- ros_topic_name: "/livox/lidar"
  gz_topic_name: "/scan_3d/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS
- ros_topic_name: "/livox/imu"
  gz_topic_name: "/scan_3d/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS
