ekf_filter_node:
  ros__parameters:
    # Reduced from 50Hz to 20Hz to lower CPU load; this config only fuses
    # wheel odometry (vx) and IMU orientation, so 20Hz is sufficient.
    frequency: 20.0
    sensor_timeout: 1.0
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.5
    print_diagnostics: true
    debug: false
    odom0: /perseus_vision/stereo_odom
    odom0_config: [true, true, false, false, false, true, true, false, false, false, false, false, false, false, false]
    # state_var: [x_pos, y_pos, z_pos, roll, pitch, yaw, x_vel, y_vel, z_vel, roll_vel, pitch_vel, yaw_vel, x_accel, y_accel, z_accel]

    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 5
    odom0_nodelay: true
    odom0_pose_rejection_threshold: 2.0
    odom0_twist_rejection_threshold: 2.0

