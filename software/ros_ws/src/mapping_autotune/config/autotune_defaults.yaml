# Mapping Autotune — Default search ranges and scoring weights
# These can be overridden by passing a custom config to the autotune node.

# Scoring weights for composite map quality score (must sum to 1.0)
weights:
  wall_straightness: 0.25
  wall_thickness: 0.20
  ghost_wall_score: 0.20
  symmetry_score: 0.15
  free_space_consistency: 0.10
  occupied_density_score: 0.10

# Phase definitions — each phase varies one category of parameters
phases:
  # Phase 0: IMU calibration (no runs, just data collection)
  imu_calibration:
    enabled: true
    calibration_duration: 30.0  # seconds at rest

  # Phase 1: IMU integration mode
  imu_integration:
    enabled: true
    priority: 1
    modes:
      - name: imu_off
        ekf_imu_vyaw: false
        deadband: 0.0
      - name: imu_on
        ekf_imu_vyaw: true
        deadband: 0.0
      - name: imu_on_deadband
        ekf_imu_vyaw: true
        deadband: auto  # uses calibrated value

  # Phase 2: SLAM rotation parameters (highest impact)
  slam_rotation:
    enabled: true
    priority: 2
    parameters:
      minimum_travel_heading: [0.05, 0.1, 0.2, 0.4]
      correlation_search_space_smear_deviation: [0.02, 0.05, 0.1]
      angle_variance_penalty: [0.5, 1.0, 2.0, 3.0]

  # Phase 3: Scan matching strictness
  scan_matching:
    enabled: true
    priority: 3
    parameters:
      minimum_angle_penalty: [0.9, 0.95, 0.99]
      link_match_minimum_response_fine: [0.3, 0.4, 0.5, 0.6]
      minimum_distance_penalty: [0.5, 0.7, 0.9]

  # Phase 4: Timing parameters
  timing:
    enabled: true
    priority: 4
    parameters:
      throttle_scans: [1, 2, 3, 5]
      minimum_time_interval: [0.1, 0.3, 0.5]
      transform_publish_period: [0.02, 0.05, 0.1]

  # Phase 5: Speed limits (maneuver params)
  speed:
    enabled: true
    priority: 5
    parameters:
      rotation_speed: [0.2, 0.3, 0.5, 1.0]
      linear_speed: [0.1, 0.2, 0.3]

  # Phase 6: EKF process noise
  ekf_noise:
    enabled: true
    priority: 6
    parameters:
      process_noise_yaw: [0.03, 0.06, 0.12]
      process_noise_vyaw: [0.01, 0.02, 0.04]

# Default maneuver settings
maneuver:
  pattern: box_return  # box_return or corridor
  linear_speed: 0.2    # m/s
  rotation_speed: 0.5  # rad/s

# Budget allocation — how to distribute max_runs across phases
# Weights are relative; actual allocation is proportional
budget_weights:
  imu_integration: 3
  slam_rotation: 4
  scan_matching: 3
  timing: 2
  speed: 2
  ekf_noise: 2
