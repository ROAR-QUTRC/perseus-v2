/kibisis/kibisis_control_manager:
  ros__parameters:
    update_rate: 50
    lock_memory: False

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_base_controller:
      type: diff_drive_controller/DiffDriveController

    # ForwardCommandController for space motor GPIO command interface
    space_motor_controller:
      type: forward_command_controller/ForwardCommandController

    # ForwardCommandController for moisture sensor trigger GPIO command interface
    moisture_trigger_controller:
      type: forward_command_controller/ForwardCommandController

# Joint state broadcaster also broadcasts GPIO state interfaces (moisture adc_raw)
joint_state_broadcaster:
  ros__parameters:
    map_interface_to_joint_state:
      effort: current

# Differential drive controller
/kibisis/diff_drive_base_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]
    wheel_separation: 0.30
    wheels_per_side: 1
    wheel_radius: 0.10
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    open_loop: false
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    enable_odom_tf: true
    cmd_vel_timeout: 0.5
    use_stamped_vel: true
    linear.x.max_velocity: 1.0
    linear.x.max_acceleration: 5.0
    linear.x.max_jerk: .NAN
    angular.z.max_velocity: 3.0
    angular.z.max_acceleration: 5.0
    angular.z.max_jerk: .NAN

# Space motor — ForwardCommandController for space_motor/velocity GPIO interface
space_motor_controller:
  ros__parameters:
    joints:
      - space_motor
    interface_name: velocity

# Moisture trigger — ForwardCommandController for moisture_sensor/trigger GPIO interface
moisture_trigger_controller:
  ros__parameters:
    joints:
      - moisture_sensor
    interface_name: trigger
