# Device identity and startup selection.
camera_name: camera
camera_namespace: camera
initial_reset: false
accelerate_gpu_with_glsl: false
log_level: info
output: screen
# Color stream settings.
# Lightweight profile to reduce bandwidth and CPU load.
enable_color: true
rgb_camera.color_profile: 424,240,15
rgb_camera.color_format: RGB8
rgb_camera.enable_auto_exposure: true
# Depth and infrared stream settings.
# Only depth is enabled; infrared streams stay off.
enable_depth: true
enable_infra: false
enable_infra1: false
enable_infra2: false
depth_module.depth_profile: 424,240,15
depth_module.depth_format: Z16
depth_module.infra_profile: 0,0,0
depth_module.infra_format: RGB8
depth_module.infra1_format: Y8
depth_module.infra2_format: Y8
depth_module.color_profile: 0,0,0
depth_module.color_format: RGB8
depth_module.exposure: 8500
depth_module.gain: 16
depth_module.hdr_enabled: false
depth_module.enable_auto_exposure: true
depth_module.exposure.1: 7500
depth_module.gain.1: 16
depth_module.exposure.2: 1
depth_module.gain.2: 16
# Synchronization and IMU publication.
# Keeps color and depth timestamps aligned while leaving IMU outputs off.
enable_sync: true
depth_module.inter_cam_sync_mode: 0
enable_rgbd: false
enable_gyro: false
enable_accel: false
gyro_fps: 0
enable_motion: false
accel_fps: 0
unite_imu_method: 0
# Sensor clipping and covariance values.
clip_distance: -2.0
angular_velocity_cov: 0.01
linear_accel_cov: 0.01
# TF and diagnostics publication.
diagnostics_period: 0.0
publish_tf: true
tf_publish_rate: 0.0
# Point cloud generation options.
# Disabled for a minimal camera-only setup.
pointcloud.enable: false
pointcloud.stream_filter: 2
pointcloud.stream_index_filter: 0
pointcloud.ordered_pc: false
pointcloud.allow_no_texture_points: false
# Post-processing filters applied by the RealSense driver.
# Align depth to the RGB camera frame so pixels match the color image.
align_depth.enable: true
colorizer.enable: false
decimation_filter.enable: false
decimation_filter.filter_magnitude: 2
rotation_filter.enable: false
rotation_filter.rotation: 0.0
spatial_filter.enable: false
temporal_filter.enable: false
disparity_filter.enable: false
hole_filling_filter.enable: false
hdr_merge.enable: false
# Device connection and reconnection timing.
wait_for_device_timeout: -1.0
reconnect_timeout: 6.0
# Root frame naming.
base_frame_id: link
tf_prefix: ""
# Safety camera stream options for supported devices.
enable_safety: false
safety_camera.safety_mode: 0
# Additional depth-mapping outputs for supported devices.
enable_labeled_point_cloud: false
depth_mapping_camera.labeled_point_cloud_profile: 0,0,0
enable_occupancy: false
depth_mapping_camera.occupancy_profile: 0,0,0
